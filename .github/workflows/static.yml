name: Deploy Astro site to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 18

      - run: npm install
      - run: npm run build
      - uses: actions/deploy-pages@v1.2.9
        with:
          token: ${{ github.token }}
          
